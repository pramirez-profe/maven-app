name: build java application
on:
  push:
  pull_request:
    branches:
      - main
      - develop

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: clonar codigo
        uses: actions/checkout@v6
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        with:
          # Este es el comando por default
          command: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
      - name: Run Snyk monitor to take and send snapshot
        uses: snyk/actions/maven@master
        with:
          command: monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: instalar java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      # Esto es necesario cuando se ejecuta la synk/action 
      # debido a que esta se ejecuta en un contenedor 
      # que corre con usuario root y crea el directorio
      # target con su propiedad, impidiendo que el 
      # proximo comando de maven escriba en tal directorio
      # pueso que este githuub lo ejecutara con un usuario
      # llamado runner
      - name: Corregit permisos en directorio target
        run: sudo chown -R runner:runner target/
      - name: compilar y ejecutar test
        run: mvn verify 
      - name: Publicar reporte de jacoco
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-report
          path: target/site/jacoco
      - name: Publicar reporte en el PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 85
          title: Reporte de cobertura JaCoCo
  empaquetar:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: clonar codigo
        uses: actions/checkout@v6
      - name: verificar version de java
        run: java -version
      - name: instalar java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: verificar version de java
        run: java -version
      - name: empaquetar aplicacion
        run: mvn package -DskipTests
      - name: Publicar paquete
        uses: actions/upload-artifact@v6
        with:
          name: maven-app
          path: target/*.jar
